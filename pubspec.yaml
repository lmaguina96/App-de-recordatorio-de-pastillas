name: recordatorio_pastilla
description: "App de recordatorio de medicamentos para Luis"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Base de datos local
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notificaciones / alarmas
  awesome_notifications: ^0.9.3+1

  # Animaciones
  animate_do: ^3.3.9

  # Selector de imágenes
  image_picker: ^1.1.2

  # Formato de fechas
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.2

  # Generadores Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/