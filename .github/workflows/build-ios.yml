name: Build iOS
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
            
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      - name: Prepare iOS Configuration
        # Genera los archivos .rb y la carpeta Flutter que el Podfile necesita
        run: flutter build ios --config-only --no-codesign

      - name: Install CocoaPods
        run: |
          cd ios
          # Si falla el pod install, que no detenga el proceso para que el build final lo intente
          pod install || true

      - name: Build iOS (No Sign)
        # Este comando es el que realmente genera el archivo para el iPhone
        run: flutter build ios --release --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app